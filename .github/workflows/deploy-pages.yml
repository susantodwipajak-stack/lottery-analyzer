name: 🚀 部署 GitHub Pages

on:
  # 每次 daily.yml 更新数据后自动部署
  workflow_run:
    workflows: ["📊 每日自动分析"]
    types: [completed]
  # 代码推送到 main 也触发
  push:
    branches: [main]
  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 避免并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: ⚙️ 配置 Pages
        uses: actions/configure-pages@v5

      - name: 📦 打包站点
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
