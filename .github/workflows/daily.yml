name: 📊 每日自动分析

on:
  schedule:
    # 每天 UTC 01:00 = 北京09:00（早间拉取赛事 + 生成推荐）
    - cron: '0 1 * * *'
    # 每天 UTC 07:00 = 北京15:00（午后更新赛事 + 更新推荐）
    - cron: '0 7 * * *'
    # 每天 UTC 09:00 = 北京17:00（赛前最后更新）
    - cron: '0 9 * * *'
    # 每天 UTC 13:30 = 北京21:30（DLT开奖后 + 比对足彩结果）
    - cron: '30 13 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🛠️ 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚽ 抓取足彩赛事数据
        run: node scripts/fetch-matches.js

      - name: 🎯 生成足彩推荐方案
        run: node scripts/generate-fb-picks.js

      - name: 📊 比对足彩结果 + 模型进化
        run: node scripts/compare-fb-results.js

      - name: 📥 抓取开奖数据
        run: node scripts/fetch-data.js

      - name: 📊 运行DLT分析 + 生成预测
        run: node scripts/analyze.js

      - name: 💾 提交更新
        run: |
          git config user.name "Lottery Bot 🤖"
          git config user.email "bot@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 自动更新 $(date +%Y-%m-%d_%H:%M) | ⚽$(cat data/matches.json 2>/dev/null | grep -o '"totalMatches":[0-9]*' | head -1 | cut -d: -f2 || echo 0)场 | 🎯v$(cat data/model-params.json 2>/dev/null | grep -o '"version":[0-9]*' | head -1 | cut -d: -f2 || echo 1)"
          git push
